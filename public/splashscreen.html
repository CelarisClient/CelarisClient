<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celaris</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      body {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 18px;
        cursor: default;
        background:
          radial-gradient(120% 100% at 50% 30%, #1a1140 0%, #0a0712 70%);
        font-family: "Chakra Petch", system-ui, sans-serif;
        color: #e9edf6;
        border: 1px solid #2a2150;
      }
      .logo-wrap { position: relative; width: 120px; height: 120px; }
      .logo { width: 120px; height: 120px; object-fit: contain;
              filter: drop-shadow(0 6px 24px rgba(157, 92, 255, 0.45)); }
      .ring {
        position: absolute; inset: -10px; border-radius: 50%;
        border: 2px solid transparent; border-top-color: #9d5cff; border-right-color: #c46bff;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .word { font-size: 1.9rem; font-weight: 700; letter-spacing: 3px;
              background: linear-gradient(135deg, #c9b3ff, #ffffff);
              -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .sub { font-family: ui-monospace, monospace; font-size: 0.62rem; letter-spacing: 3px; color: #8a7fb0; }
      .bar { width: 200px; height: 3px; border-radius: 99px; background: #221a3e; overflow: hidden; }
      .bar i { display: block; height: 100%; width: 40%; border-radius: 99px;
               background: linear-gradient(90deg, #9d5cff, #c46bff);
               animation: slide 1.1s ease-in-out infinite; }
      @keyframes slide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
      /* Whole splash is a drag region; children pass clicks through to it. */
      body > * { pointer-events: none; }
    </style>
  </head>
  <body data-tauri-drag-region>
    <div class="logo-wrap">
      <div class="ring"></div>
      <img class="logo" src="/celaris-logo.png" alt="Celaris" />
    </div>
    <div class="word">CELARIS</div>
    <div class="sub">LAUNCHER · WIRD GELADEN</div>
    <div class="bar"><i></i></div>
  </body>
</html>
