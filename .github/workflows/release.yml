name: Release

# Baut den Celaris-Launcher für Windows, macOS und Linux und hängt alle
# Installer automatisch an ein GitHub-Release.
#
# Auslöser: ein gepushter Tag wie v1.0.0  (oder manuell über "Run workflow").

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write # nötig, damit die Action das Release erstellen darf
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # → .dmg (Universal: Apple Silicon + Intel)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04 # → .AppImage, .deb, .rpm
            args: ""
          - platform: windows-latest # → .exe (NSIS) + .msi (WiX)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust einrichten
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust-Cache (schnellere Folge-Builds)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Linux-Systemabhängigkeiten
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libgtk-3-dev \
            libxdo-dev \
            libssl-dev

      - name: Frontend-Abhängigkeiten installieren
        run: npm ci

      - name: Bauen & Release erstellen
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Required so the updater artifacts (.sig) are signed — without this the
          # auto-updater can't verify a release and silently does nothing.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Celaris ${{ github.ref_name }}"
          releaseBody: "Lade unten den Launcher für dein System herunter."
          releaseDraft: true # Release wird als Entwurf erstellt → du veröffentlichst es selbst
          prerelease: false
          args: ${{ matrix.args }}
